name: immortal_app
description: "Hệ Thống Tu Tiên mobile application."
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  equatable: ^2.0.5
  flutter_bloc: ^8.1.6
  flutter_local_notifications: ^21.0.0
  flutter_secure_storage: ^10.0.0
  intl: ^0.20.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/launcher/immortal_logo.png
  adaptive_icon_background: "#101823"
  adaptive_icon_foreground: assets/launcher/immortal_logo.png
  remove_alpha_ios: true

flutter:
  config:
    enable-lldb-debugging: false
  generate: true
  uses-material-design: true
